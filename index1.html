<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #ffcccc, #ff4d6d);
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* container xoay */
.container {
    text-align: center;
    animation: rotate 20s linear infinite;
}

/* trái tim chính */
.heart {
    width: 100px;
    height: 100px;
    background: pink;
    position: relative;
    transform: rotate(-45deg);
    margin: 0 auto;
    animation: beat 1s infinite;
}

.heart::before,
.heart::after {
    content: "";
    width: 100px;
    height: 100px;
    background: pink;
    border-radius: 50%;
    position: absolute;
}

.heart::before {
    top: -50px;
    left: 0;
}

.heart::after {
    left: 50px;
    top: 0;
}

/* chữ */
.text {
    margin-top: 40px;
    color: white;
    font-size: 18px;
    text-shadow: 1px 1px 3px red;
}

/* hiệu ứng */
@keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes beat {
    0%, 100% { transform: scale(1) rotate(-45deg); }
    50% { transform: scale(1.2) rotate(-45deg); }
}

/* tim bay */
.flying-heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: fly 5s linear infinite;
}

@keyframes fly {
    0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- 🎵 Nhạc -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="heart"></div>
    <div class="text">
        <p>anh iu em bé ❤️</p>
        <p>anh xin lỗi 💔</p>
    </div>
</div>

<script>
/* tạo tim bay */
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "flying-heart";
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
